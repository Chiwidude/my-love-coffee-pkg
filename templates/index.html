<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoreo IoT Café</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-gradient-to-br from-amber-50 to-orange-50 font-sans h-full m-0 p-0 box-border">

  <div class="w-full h-full overflow-auto">
    <div class="container mx-auto p-6 pb-12">
      
      <header class="mb-8 text-center">
        <div class="flex items-center justify-center gap-2 mb-2">
          <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
          <span class="text-xs font-medium text-green-600">Conectado</span>
        </div>
        <h1 class="text-4xl font-bold text-amber-900 mb-2">Dashboard IoT</h1>
        <p class="text-amber-700">Empaque de Café • Monitoreo en Tiempo Real</p>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        
        <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-lg border-t-4 border-blue-500 hover:shadow-xl hover:scale-105 transition-all duration-300">
          <h3 class="text-gray-500 font-medium text-sm uppercase tracking-wide">Humedad Ambiente</h3>
          <p class="text-5xl font-bold text-blue-600 mt-4" id="humedad-val">--</p>
          <p class="text-gray-400 text-sm mt-2">Última actualización</p>
        </div>

        <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-lg border-t-4 border-orange-500 hover:shadow-xl hover:scale-105 transition-all duration-300">
          <h3 class="text-gray-500 font-medium text-sm uppercase tracking-wide">Temperatura</h3>
          <p class="text-5xl font-bold text-orange-600 mt-4" id="temp-val">--</p>
          <p class="text-gray-400 text-sm mt-2">Grados Celsius</p>
        </div>

        <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-lg border-t-4 border-emerald-500 hover:shadow-xl hover:scale-105 transition-all duration-300">
          <h3 class="text-gray-500 font-medium text-sm uppercase tracking-wide">Presión</h3>
          <p class="text-5xl font-bold text-emerald-600 mt-4" id="presion-val">--</p>
          <p class="text-gray-400 text-sm mt-2">Hectopascales</p>
        </div>

      </div>

      <div class="bg-white/80 backdrop-blur p-8 rounded-2xl shadow-lg">
        <h2 class="text-lg font-bold text-gray-800 mb-6">Gráfica de Humedad</h2>
        <div class="relative h-[350px]">
          <canvas id="graficaTiempoReal"></canvas>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Inicializar iconos de Lucide (por si agregan más tarde)
    lucide.createIcons();

    const firebaseConfig = {
        databaseURL: "https://my-love-coffee-pkg-default-rtdb.firebaseio.com/"
    };
    
    try {
        firebase.initializeApp(firebaseConfig);
    } catch(e) {
        console.log("Firebase ya inicializado");
    }
    
    const database = firebase.database();

    // Configuración del gráfico de Chart.js
    const ctx = document.getElementById('graficaTiempoReal').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Humedad %',
                data: [],
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                borderWidth: 3,
                pointRadius: 5,
                pointBackgroundColor: '#3b82f6',
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                tension: 0.4,
                fill: true
            }]
        },
        options: { 
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    display: true,
                    labels: { color: '#666', font: { size: 14 } }
                }
            },
            scales: { 
                y: { 
                    min: 0, 
                    max: 100,
                    ticks: { color: '#999' },
                    grid: { color: 'rgba(0,0,0,0.05)' }
                },
                x: {
                    ticks: { color: '#999' },
                    grid: { color: 'rgba(0,0,0,0.05)' }
                }
            }
        }
    });

    // Escucha de Firebase Realtime
    database.ref('monitoreo_cafe/actual').on('value', (snapshot) => {
        const data = snapshot.val();

        if(data) {
            // 1. Actualizar los textos de las tarjetas
            document.getElementById('humedad-val').innerText = data.humedad.toFixed(1) + '%';
            document.getElementById('temp-val').innerText = data.temperatura.toFixed(1) + '°C';
            document.getElementById('presion-val').innerText = data.presion.toFixed(1) + ' hPa';

            // 2. Extraer solo el "HH:MM:SS" del timestamp que viene de Python
            const horaLectura = data.timestamp.split(' ')[1]; 

            // 3. Controlar que la gráfica no se llene de demasiados puntos (Máximo 15)
            if (chart.data.labels.length > 15) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }

            // 4. Agregar la hora del sensor y el valor de humedad a la gráfica
            chart.data.labels.push(horaLectura); // <-- Usamos la hora del sensor real
            chart.data.datasets[0].data.push(data.humedad);
            
            // 5. Renderizar los cambios
            chart.update();
        }
    }, (error) => {
        console.error("Error conectando a Firebase:", error);
    });
  </script>
</body>
</html>
